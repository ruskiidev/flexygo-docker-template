services:
  flx-frontend:
    image: flexygo/flexygo-frontend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "${FRONTEND_PORT}:8080"
    volumes:
      - flx-front-conf:/app/conf
      - flx-front-custom:/app/custom
    networks:
      - flx-front-network
    depends_on:
      - flx-backend

  flx-backend:
    image: flexygo/flexygo-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
      ADMIN_PASSWORD: "admin123"
    ports:
      - "60952:8080"
    volumes:
      - flx-back-conf:/app/conf
      - flx-back-custom:/app/custom
    networks:
      - flx-front-network
      - flx-back-network
    depends_on:
      flx-db:
        condition: service_healthy

  flx-db:
    image: flexygo/flexygo-db
    restart: unless-stopped
    ports:
      - "14333:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_PASSWORD}"
      MSSQL_PID: "Evaluation"
    networks:
      - flx-back-network
    volumes:
      - flx-db-data:/var/opt/mssql/data/
      - flx-db-log:/var/opt/mssql/log/
      - flx-db-secrets:/var/opt/mssql/secrets/

  filebrowser:
    image: filebrowser/filebrowser:latest
    user: "1000:1000"
    ports:
      - "3000:80"
    volumes:
      - flx-front-conf:/srv/conf-frontend
      - flx-front-custom:/srv/custom-frontend
      - flx-back-conf:/srv/conf-backend
      - flx-back-custom:/srv/custom-backend
      - filebrowser-database:/database
      - filebrowser-config:/config
    environment:
      FB_DATABASE: /database/filebrowser.db
      FB_CONFIG: /config/settings.json
      FB_ROOT: /srv
      FB_LOG: stdout
    networks:
      - flx-back-network
      - flx-front-network
    depends_on:
      flx-filebrowser-init:
        condition: service_completed_successfully

  # ── Servicio init: ajusta permisos y termina ──────────────
  flx-filebrowser-init:
    image: alpine:latest
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p \
          /srv/conf-frontend \
          /srv/custom-frontend \
          /srv/conf-backend \
          /srv/custom-backend \
          /database \
          /config
        chown -R 1000:1000 \
          /srv/conf-frontend \
          /srv/custom-frontend \
          /srv/conf-backend \
          /srv/custom-backend \
          /database \
          /config
        chmod -R 775 \
          /srv/conf-frontend \
          /srv/custom-frontend \
          /srv/conf-backend \
          /srv/custom-backend \
          /database \
          /config
        echo "Permisos aplicados correctamente."
    volumes:
      - flx-front-conf:/srv/conf-frontend
      - flx-front-custom:/srv/custom-frontend
      - flx-back-conf:/srv/conf-backend
      - flx-back-custom:/srv/custom-backend
      - filebrowser-database:/database
      - filebrowser-config:/config
    networks:
      - flx-back-network
      - flx-front-network

networks:
  flx-front-network:
    driver: bridge
  flx-back-network:
    driver: bridge

volumes:
  filebrowser-database:
  filebrowser-config:
  flx-front-conf:
  flx-front-custom:
  flx-back-conf:
  flx-back-custom:
  flx-db-data:
  flx-db-log:
  flx-db-secrets: